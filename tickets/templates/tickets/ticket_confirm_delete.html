{% extends 'core/base.html' %}
{% block title %}Conferma Eliminazione Ticket{% endblock %}

{% block content %}
<div class="dashboard-card p-4">
    <h2 class="dashboard-title mb-4">Conferma Eliminazione</h2>
    <p>Sei sicuro di voler eliminare il ticket "<strong>{{ ticket.title }}</strong>"?</p>
    <p class="text-danger">Questa azione è irreversibile.</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sì, elimina</button>
        <a href="{% url 'core:ticket_list' %}" class="btn btn-secondary">Annulla</a>
    </form>
</div>
{% endblock %}
