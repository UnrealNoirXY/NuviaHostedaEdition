<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>Nuvia — Command palette</title>
<link rel="stylesheet" href="tokens.css">
<style>
.bg{position:fixed;inset:0;background:var(--bg);display:flex}
.bg .side{width:248px;background:#0C1019;border-right:1px solid var(--line)}
.bg .top{height:56px;border-bottom:1px solid var(--line)}
.scrim{position:fixed;inset:0;background:rgba(5,7,11,.66);backdrop-filter:blur(3px);display:grid;place-items:start center;padding-top:120px}
.pal{width:600px;background:var(--surface);border:1px solid var(--line-strong);border-radius:16px;box-shadow:0 30px 80px rgba(0,0,0,.6);overflow:hidden}
.pal .in{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:1px solid var(--line)}
.pal .in svg{width:19px;height:19px;color:var(--ink-3)}
.pal .in input{flex:1;background:none;border:0;outline:0;color:var(--ink);font-size:16px;font-family:var(--sans)}
.pal .in .cur{width:2px;height:20px;background:var(--accent);animation:none}
.pal .esc{border:1px solid var(--line-strong);border-radius:5px;padding:2px 7px;font-size:11px;font-family:var(--mono);color:var(--ink-3)}
.grp{padding:8px 0}
.grp .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-3);padding:8px 18px 4px}
.opt{display:flex;align-items:center;gap:13px;padding:10px 18px;cursor:pointer;color:var(--ink-2);font-size:14px}
.opt svg{width:17px;height:17px;flex:none}
.opt .k{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-3)}
.opt.sel{background:var(--accent-soft);color:var(--ink)}
.opt.sel svg{color:var(--accent)}
.opt .tag{margin-left:auto}
.foot{display:flex;gap:16px;padding:10px 18px;border-top:1px solid var(--line);font-size:11px;color:var(--ink-3)}
.foot b{font-family:var(--mono);border:1px solid var(--line);border-radius:4px;padding:0 5px;color:var(--ink-2)}
</style></head>
<body>
<div class="bg"><div class="side"></div><div style="flex:1"><div class="top"></div></div></div>
<div class="scrim">
  <div class="pal">
    <div class="in"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg><span style="color:var(--ink)">recens</span><span class="cur"></span><span style="flex:1"></span><span class="esc">esc</span></div>
    <div class="grp">
      <div class="lbl">Vai a</div>
      <div class="opt sel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17.3 6.2 21l1.5-6.6L3 9.8l6.7-.6L12 3l2.3 6.2 6.7.6-4.7 4.6L17.8 21z"/></svg> Dashboard Recensioni <span class="k">↵</span></div>
      <div class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18M7 14l3-3 3 3 5-6"/></svg> Recensioni · Centro di Analisi</div>
      <div class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg> Recensioni · Report builder</div>
    </div>
    <div class="grp">
      <div class="lbl">Azioni</div>
      <div class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg> Esporta report recensioni (PDF) <span class="tag"><span style="font-size:11px;color:var(--ink-3)">azione</span></span></div>
      <div class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Avvia nuovo scraping recensioni</div>
    </div>
    <div class="grp">
      <div class="lbl">Risultati</div>
      <div class="opt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/></svg> "Camera non pulita all'arrivo" <span style="margin-left:auto"><span class="tag g" style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;background:var(--neg-bg);color:var(--neg)">Negativo</span></span></div>
    </div>
    <div class="foot"><span><b>↑</b> <b>↓</b> naviga</span><span><b>↵</b> apri</span><span><b>esc</b> chiudi</span></div>
  </div>
</div>
</body></html>
