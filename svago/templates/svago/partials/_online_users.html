<div class="card shadow mb-4">
    <div class="card-header py-3">
        <h6 class="m-0 font-weight-bold text-success">Utenti Online</h6>
    </div>
    <div class="card-body">
        <ul class="list-group">
            {% for u in users %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    <div>
                        <span style="width: 10px; height: 10px; background-color: #28a745; border-radius: 50%; display: inline-block;" title="Online"></span>
                        <span class="ms-2"><b>{{ u.gamertag }}</b></span>
                    </div>
                    <form action="{% url 'svago:invite_player' u.id %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-primary btn-sm">Invita a giocare a Tris</button>
                    </form>
                </li>
            {% empty %}
                <li class="list-group-item">Nessun altro utente online al momento.</li>
            {% endfor %}
        </ul>
    </div>
</div>
