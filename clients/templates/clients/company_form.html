{% extends 'core/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="dashboard-card p-4">
            <h1 class="dashboard-title mb-4">{{ title }}</h1>
            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.name.id_for_label }}" class="form-label">Nome Società</label>
                    {{ form.name }}
                </div>

                <div class="mb-3">
                    <label for="{{ form.logo.id_for_label }}" class="form-label">Logo</label>
                    {{ form.logo }}
                </div>

                <div class="form-check mb-3">
                    {{ form.is_active }}
                    <label class="form-check-label" for="{{ form.is_active.id_for_label }}">
                        Società Attiva
                    </label>
                </div>

                <button type="submit" class="btn btn-primary">Salva</button>
                <a href="{% url 'clients:company_list' %}" class="btn btn-secondary">Annulla</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
