# HTTP server block: redirects all traffic to HTTPS
server {
    listen 80;
    server_name noirtech.online www.noirtech.online 72.60.36.75;

    # Redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block
server {
    listen 443 ssl;
    server_name noirtech.online www.noirtech.online 72.60.36.75;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/noirtech.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noirtech.online/privkey.pem;

    client_max_body_size 100M;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /home/deploy/manutenzionetest/staticfiles/;
    }

    location /media/ {
        root /home/deploy/manutenzionetest;
    }

    # Main application and WebSocket proxy
    location / {
        proxy_pass http://unix:/home/deploy/manutenzionetest/gunicorn.sock;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Gunicorn/Uvicorn can handle both HTTP and WebSocket on the same socket
    }
}
