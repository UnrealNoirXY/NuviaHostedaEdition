{% load static django_vite custom_tags %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nuvia OS | Operational Operating System</title>
    <link rel="icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    <link rel="manifest" href="{% static 'vite/manifest.webmanifest' %}">
    <meta name="theme-color" content="#020617">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    {% vite_asset 'src/main.css' %}
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #020617;
            font-family: 'Inter', sans-serif;
        }
        #root {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body data-user-role="{{ user.role }}" data-user-name="{{ user.get_full_name|default:user.username }}" data-avatar-url="https://ui-avatars.com/api/?name={{ user.username }}&background=020617&color=fff">
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100%; flex-direction: column; color: white;">
            <img src="{% static 'img/logo.png' %}" style="width: 80px; margin-bottom: 2rem; filter: brightness(0) invert(1);">
            <i class="fas fa-circle-notch fa-spin fa-2x"></i>
        </div>
    </div>

    {% vite_asset 'src/main.jsx' %}
</body>
</html>
