{% extends "core/base.html" %}

{% block title %}Conferma Eliminazione{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-danger text-white">
                    <h3 class="card-title mb-0">Conferma Eliminazione Annuncio</h3>
                </div>
                <div class="card-body">
                    <p>Sei sicuro di voler eliminare l'annuncio intitolato "<strong>{{ announcement.title }}</strong>"?</p>
                    <p class="text-danger">Questa azione è irreversibile.</p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-end">
                            <a href="{% url 'profile' %}" class="btn btn-secondary me-2">Annulla</a>
                            <button type="submit" class="btn btn-danger">Sì, Elimina</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
