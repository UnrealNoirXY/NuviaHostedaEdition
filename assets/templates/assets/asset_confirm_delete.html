{% extends 'core/base.html' %}
{% block title %}Conferma Eliminazione Asset{% endblock %}

{% block content %}
<div class="dashboard-card p-4 mx-auto" style="max-width: 600px;">
    <h2 class="dashboard-title mb-4">Conferma Eliminazione</h2>
    <p>Sei sicuro di voler eliminare l'asset "<strong>{{ asset.name }}</strong>"?</p>
    <p class="text-danger">Questa azione non può essere annullata.</p>

    <form method="post">
        {% csrf_token %}
        <div class="mt-4">
            <button type="submit" class="btn btn-danger">Sì, Elimina</button>
            <a href="{% url 'assets:asset-list' %}" class="btn btn-secondary">Annulla</a>
        </div>
    </form>
</div>
{% endblock %}
