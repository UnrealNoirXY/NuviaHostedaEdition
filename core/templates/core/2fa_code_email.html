<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Tuo Codice di Accesso</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif, 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol';
            background-color: #f8f9fa;
        }
        .email-wrapper {
            background-color: #f8f9fa;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            background-color: #ffffff;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            overflow: hidden;
        }
        .header {
            background-color: #23395d;
            padding: 40px 20px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            color: #ffffff;
            margin: 0;
            font-weight: 600;
        }
        .content {
            padding: 35px 40px;
            line-height: 1.6;
            color: #555;
            font-size: 16px;
            text-align: center;
        }
        .content p {
            margin: 0 0 18px;
        }
        .code-container {
            margin: 30px 0;
        }
        .code {
            display: inline-block;
            padding: 15px 40px;
            font-size: 36px;
            font-weight: 700;
            color: #23395d;
            background-color: #f1f1f1;
            border-radius: 8px;
            letter-spacing: 8px;
        }
        .footer {
            text-align: center;
            padding: 30px 20px;
            font-size: 12px;
            color: #999;
            background-color: #f1f1f1;
        }
    </style>
</head>
<body>
    <div class="email-wrapper">
        <div class="container">
            <div class="header">
                <h1>Il Tuo Codice di Accesso</h1>
            </div>
            <div class="content">
                <p>Ciao {{ user.username }},</p>
                <p>Usa il seguente codice per completare il tuo accesso. Il codice scadrà tra 5 minuti.</p>
                <div class="code-container">
                    <span class="code">{{ code }}</span>
                </div>
                <p>Se non hai richiesto tu questo codice, puoi tranquillamente ignorare questa email.</p>
            </div>
            <div class="footer">
                <p>&copy; {% now "Y" %} {{ site_name }}. Tutti i diritti riservati.</p>
            </div>
        </div>
    </div>
</body>
</html>
