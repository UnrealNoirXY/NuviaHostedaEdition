{% extends 'core/base.html' %}
{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="dashboard-card p-4">
            <h2 class="dashboard-title mb-4">{{ title }}</h2>
            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.resort.id_for_label }}" class="form-label">{{ form.resort.label }}</label>
                    {{ form.resort }}
                    {{ form.resort.errors }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.name.id_for_label }}" class="form-label">{{ form.name.label }}</label>
                    {{ form.name }}
                    {{ form.name.errors }}
                </div>
                <div class="mb-3">
                    <label for="{{ form.description.id_for_label }}" class="form-label">{{ form.description.label }}</label>
                    {{ form.description }}
                    {{ form.description.errors }}
                </div>

                <div class="mt-4">
                    <button type="submit" class="btn btn-success">Salva</button>
                    <a href="{% url 'core:room_list' %}" class="btn btn-secondary">Annulla</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
