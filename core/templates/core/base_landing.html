{% load static django_vite %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ platform_name|default:"Platform" }}{% endblock %}</title>
    <link rel="icon" href="{% static 'img/favicon.ico' %}" type="image/x-icon">
    {% vite_asset 'src/landing.css' %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    {% block extra_head %}{% endblock %}
</head>
<style>
    html, body {
        height: 100%;
    }
</style>
<body style="--theme-color-main: {{ theme_color|default:'#23395d' }}; --theme-color-secondary: {{ theme_color_secondary|default:'#406fa6' }};" class="{% block body_class %}{% endblock %}">

    {% block content %}{% endblock %}

    <footer class="footer py-3 bg-dark text-center">
        <div class="container">
            <span class="text-muted">Powered By Noir 2025</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
