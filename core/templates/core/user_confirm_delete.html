{% extends 'core/base.html' %}
{% block title %}Conferma Eliminazione Utente{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="dashboard-card p-4 text-center">
            <h2 class="dashboard-title mb-4">Conferma Eliminazione</h2>
            <p>Sei sicuro di voler eliminare l'utente <strong>{{ user_to_delete.username }}</strong>?</p>
            <p class="text-danger">Questa azione è irreversibile.</p>

            <form method="post">
                {% csrf_token %}
                <div class="mt-4">
                    <button type="submit" class="btn btn-danger">Sì, elimina</button>
                    <a href="{% url 'core:user_list' %}" class="btn btn-secondary">Annulla</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
