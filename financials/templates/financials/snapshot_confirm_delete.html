{% extends 'core/base.html' %}
{% block title %}Elimina Snapshot{% endblock %}

{% block content %}
<div class="dashboard-card p-4">
    <h2 class="dashboard-title mb-3">Conferma eliminazione</h2>
    <p class="text-muted">Stai per eliminare lo snapshot <strong>{{ snapshot }}</strong>. L'operazione non può essere annullata e verranno rimossi anche i dettagli associati.</p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-between">
            <a href="{% url 'financials:snapshot_list' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-2"></i>Annulla</a>
            <button type="submit" class="btn btn-danger"><i class="fas fa-trash me-2"></i>Elimina definitivamente</button>
        </div>
    </form>
</div>
{% endblock %}
