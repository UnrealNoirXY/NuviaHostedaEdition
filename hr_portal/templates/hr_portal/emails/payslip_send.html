<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .header {
            background-color: #4A90E2;
            color: #ffffff;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 24px;
        }
        .content {
            padding: 30px;
        }
        .content p {
            margin-bottom: 20px;
        }
        .attachment {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 12px 16px;
            margin-top: 20px;
            font-size: 14px;
        }
        .footer {
            background-color: #f8f9fa;
            color: #6c757d;
            font-size: 12px;
            text-align: center;
            padding: 20px;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Nuvia Program</h1>
        </div>
        <div class="content">
            <p>{{ body|linebreaksbr }}</p>
            <div class="attachment">
                <strong>Allegato:</strong> {{ attachment_label|default:attachment_name }}
            </div>
        </div>
        <div class="footer">
            <p>Questa è una email generata dal portale HR.</p>
            <p>Si prega di non rispondere.</p>
            <p>@2026 Nuvia Official Spin-Off Hosteda . Tutti i diritti riservati.</p>
        </div>
    </div>
</body>
</html>
