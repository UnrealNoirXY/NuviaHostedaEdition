{% extends 'core/base.html' %}
{% block title %}Carica Documento{% endblock %}

{% block content %}
<div class="dashboard-card p-4">
    <h2 class="dashboard-title mb-4">Carica Nuovo Documento</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label for="{{ form.user.id_for_label }}" class="form-label">Utente</label>
            {{ form.user }}
        </div>
        <div class="mb-3">
            <label for="{{ form.title.id_for_label }}" class="form-label">Titolo</label>
            {{ form.title }}
        </div>
        <div class="mb-3">
            <label for="{{ form.document_type.id_for_label }}" class="form-label">Tipo di Documento</label>
            {{ form.document_type }}
        </div>
        <div class="mb-3">
            <label for="{{ form.file.id_for_label }}" class="form-label">File</label>
            {{ form.file }}
        </div>
        <button type="submit" class="btn btn-success">Carica</button>
        <a href="{% url 'documents:document_list' %}" class="btn btn-secondary">Annulla</a>
    </form>
</div>
{% endblock %}
